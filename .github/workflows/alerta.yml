name: Alerta Automático

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  executar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: ls -R
      - run: python Alerta.py
